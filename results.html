<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>SPID Certificate Validation Result</title>
  <link rel="stylesheet" href="styles/results.css" />
</head>
<body>
  <h1>Esito validazione certificato SPID</h1>

  <details class="result-accordion" name="result-sections" open>
    <summary>Riepilogo esito</summary>
    <div class="accordion-content">
      <div id="summary"></div>
    </div>
  </details>

  <details class="result-accordion" name="result-sections">
    <summary>Certificate Properties</summary>
    <div class="accordion-content">
      <div id="properties"></div>
    </div>
  </details>

  <details class="result-accordion" name="result-sections">
    <summary>Validation Checks</summary>
    <div class="accordion-content">
      <div id="details"></div>
    </div>
  </details>

  <details class="result-accordion" name="result-sections">
    <summary>Raw Validator Output</summary>
    <div class="accordion-content">
      <pre id="rawOutput"></pre>
    </div>
  </details>

  <script src="results.js"></script>
</body>
</html>
